version: "3.8"

# ---------------------------------------------------------------------------
# Local development infrastructure
#
# Usage:
#   pnpm docker:up     — start containers in background
#   pnpm docker:down   — stop containers (data is preserved)
#   pnpm docker:reset  — wipe volumes and restart fresh
# ---------------------------------------------------------------------------

services:
    postgres:
        image: postgres:15-alpine
        container_name: app_postgres
        restart: "no"
        environment:
            POSTGRES_USER: ${DB_USER:-root}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
            POSTGRES_DB: ${DB_NAME:-app_db}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-app_db}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:alpine
        container_name: app_redis
        restart: "no"
        ports:
            - "${REDIS_PORT:-6379}:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    redis_data:
